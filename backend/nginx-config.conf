# DECA Configurator API — nginx config
# Add this as a new location block in your api.decacrm.com server block
# or create /etc/nginx/sites-available/deca-configurator-api

# Option A: Add to existing api.decacrm.com config
# Inside the server { } block for api.decacrm.com, add:

location /configurator/ {
    proxy_pass http://127.0.0.1:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}

